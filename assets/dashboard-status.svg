<svg xmlns="http://www.w3.org/2000/svg" width="880" height="260" viewBox="0 0 880 260" fill="none">
  <defs>
    <!-- Neon Glow Filters -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="dot-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Scan Line & Divider Gradients -->
    <linearGradient id="scan-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00FF41" stop-opacity="0" />
      <stop offset="50%" stop-color="#00FF41" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#00FF41" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="header-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00FF41" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#00FF41" stop-opacity="0.1" />
    </linearGradient>
    <clipPath id="panel-clip">
      <rect x="2" y="2" width="876" height="256" rx="12" />
    </clipPath>
  </defs>

  <style>
    @keyframes borderPulse {
      0%, 100% { stroke-opacity: 0.4; stroke: #00FF41; }
      50% { stroke-opacity: 1; stroke: #00FF66; }
    }
    @keyframes textGlow {
      0%, 100% { fill: #00FF41; opacity: 0.9; }
      50% { fill: #39FF14; opacity: 1; }
    }
    @keyframes scanline {
      0% { transform: translateX(-400px); }
      100% { transform: translateX(880px); }
    }
    @keyframes rowPulse {
      0%, 100% { opacity: 0.92; }
      50% { opacity: 1; }
    }
    @keyframes cursorBlink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }

    .panel-border { animation: borderPulse 3.5s infinite ease-in-out; }
    .header-text { animation: textGlow 3s infinite ease-in-out; }
    .scan-line { animation: scanline 4s linear infinite; }
    .row-group { animation: rowPulse 4s infinite ease-in-out; }
    .row-text { font-family: 'JetBrains Mono', 'Fira Code', 'Segoe UI Monospace', monospace; fill: #e6edf3; font-size: 13.5px; font-weight: 500; }
    .row-highlight { fill: #00FF41; font-weight: 700; }
    .cursor { animation: cursorBlink 0.8s infinite; fill: #00FF41; }
  </style>

  <!-- Main Cyber Container -->
  <rect x="2" y="2" width="876" height="256" rx="12" fill="#090d16" class="panel-border" stroke="#00FF41" stroke-width="1.5" />

  <!-- Laser Scanline Effect -->
  <g clip-path="url(#panel-clip)">
    <rect class="scan-line" x="0" y="2" width="400" height="2" fill="url(#scan-grad)" />
    <rect class="scan-line" x="0" y="256" width="400" height="2" fill="url(#scan-grad)" />
  </g>

  <!-- Four Accent Corner Dots -->
  <circle cx="16" cy="16" r="4.5" fill="#00FF41" filter="url(#dot-glow)"/>
  <circle cx="864" cy="16" r="4.5" fill="#00FF41" filter="url(#dot-glow)"/>
  <circle cx="16" cy="244" r="4.5" fill="#FF3366" filter="url(#dot-glow)"/>
  <circle cx="864" cy="244" r="4.5" fill="#00E5FF" filter="url(#dot-glow)"/>

  <!-- Center Separator Line -->
  <line x1="440" y1="20" x2="440" y2="240" stroke="#00FF41" stroke-width="1" stroke-opacity="0.25" stroke-dasharray="4 4"/>

  <!-- ================= LEFT COLUMN: WHAT I BUILD ================= -->
  <g filter="url(#neon-glow)">
    <text x="35" y="42" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="15" font-weight="800" class="header-text" letter-spacing="1">⚡ WHAT I BUILD</text>
  </g>
  <line x1="35" y1="52" x2="415" y2="52" stroke="url(#header-line)" stroke-width="1.5"/>

  <g class="row-group">
    <text x="35" y="85" class="row-text"><tspan font-size="14">🔮</tspan> <tspan class="row-highlight">GNN</tspan> fraud detection engines</text>
    <text x="35" y="120" class="row-text"><tspan font-size="14">🧠</tspan> <tspan class="row-highlight">LLM routing</tspan> &amp; agentic systems</text>
    <text x="35" y="155" class="row-text"><tspan font-size="14">📖</tspan> <tspan class="row-highlight">Offline-first</tspan> accessibility tools</text>
    <text x="35" y="190" class="row-text"><tspan font-size="14">🚄</tspan> <tspan class="row-highlight">Real-time</tspan> hazard detection (DAS)</text>
    <text x="35" y="225" class="row-text"><tspan font-size="14">💻</tspan> <tspan class="row-highlight">Full-stack</tspan> coding platforms<tspan class="cursor">_</tspan></text>
  </g>

  <!-- ================= RIGHT COLUMN: WHAT I'M UP TO NOW ================= -->
  <g filter="url(#neon-glow)">
    <text x="465" y="42" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="15" font-weight="800" class="header-text" letter-spacing="1">🎯 WHAT I'M UP TO NOW</text>
  </g>
  <line x1="465" y1="52" x2="845" y2="52" stroke="url(#header-line)" stroke-width="1.5"/>

  <g class="row-group">
    <text x="465" y="85" class="row-text"><tspan font-size="14">🔭</tspan> Training <tspan class="row-highlight">GNNs</tspan> on temporal graphs</text>
    <text x="465" y="120" class="row-text"><tspan font-size="14">🌱</tspan> Exploring <tspan class="row-highlight">multi-agent</tspan> orchestration</text>
    <text x="465" y="155" class="row-text"><tspan font-size="14">💼</tspan> Seeking <tspan class="row-highlight">AI/ML &amp; SWE</tspan> internships</text>
    <text x="465" y="190" class="row-text"><tspan font-size="14">🤝</tspan> Open to collaborations on <tspan class="row-highlight">GenAI</tspan></text>
    <text x="465" y="225" class="row-text"><tspan font-size="14">📫</tspan> Let's connect on <tspan class="row-highlight">LinkedIn!</tspan><tspan class="cursor">_</tspan></text>
  </g>
</svg>
