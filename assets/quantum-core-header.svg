<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="260" viewBox="0 0 1000 260" fill="none">
  <defs>
    <!-- High Performance Glow Filters -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3.5" result="blur1" />
      <feGaussianBlur stdDeviation="1.5" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="core-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur1" />
      <feGaussianBlur stdDeviation="3" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <radialGradient id="reactor-plasma" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#39FF14" stop-opacity="1" />
      <stop offset="35%" stop-color="#00FF41" stop-opacity="0.85" />
      <stop offset="70%" stop-color="#004d1a" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#05080e" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="scan-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00FF41" stop-opacity="0" />
      <stop offset="50%" stop-color="#00FF41" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#00FF41" stop-opacity="0" />
    </linearGradient>
    <clipPath id="header-clip">
      <rect x="2" y="2" width="996" height="256" rx="14" />
    </clipPath>
  </defs>

  <style>
    @keyframes spinCW {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes spinCCW {
      0% { transform: rotate(360deg); }
      100% { transform: rotate(0deg); }
    }
    @keyframes corePulse {
      0%, 100% { transform: scale(1); opacity: 0.9; }
      50% { transform: scale(1.15); opacity: 1; filter: drop-shadow(0px 0px 18px #00FF41); }
    }
    @keyframes textPulse {
      0%, 100% { fill: #00FF41; filter: drop-shadow(0px 0px 4px #00FF41); }
      50% { fill: #39FF14; filter: drop-shadow(0px 0px 12px #00FF41); }
    }
    @keyframes borderPulse {
      0%, 100% { stroke-opacity: 0.4; stroke: #00FF41; }
      50% { stroke-opacity: 1; stroke: #00FF66; }
    }
    @keyframes scanline {
      0% { transform: translateX(-400px); }
      100% { transform: translateX(1000px); }
    }

    .border-box { animation: borderPulse 3.5s infinite ease-in-out; }
    .ring-1 { transform-origin: 500px 130px; animation: spinCW 22s linear infinite; }
    .ring-2 { transform-origin: 500px 130px; animation: spinCCW 15s linear infinite; }
    .ring-3 { transform-origin: 500px 130px; animation: spinCW 9s linear infinite; }
    .fusion-core { transform-origin: 500px 130px; animation: corePulse 2.5s ease-in-out infinite; }
    .title-text { font-family: 'Outfit', 'JetBrains Mono', sans-serif; font-weight: 900; font-size: 82px; animation: textPulse 3s infinite ease-in-out; letter-spacing: 6px; }
    .sub-text { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 15px; fill: #00FF41; letter-spacing: 3px; }
    .scan-line { animation: scanline 4s linear infinite; }
  </style>

  <!-- Container Box -->
  <rect x="2" y="2" width="996" height="256" rx="14" fill="#05080e" class="border-box" stroke="#00FF41" stroke-width="1.5" />

  <!-- Laser Scanline -->
  <g clip-path="url(#header-clip)">
    <rect class="scan-line" x="0" y="2" width="400" height="2" fill="url(#scan-grad)" />
    <rect class="scan-line" x="0" y="256" width="400" height="2" fill="url(#scan-grad)" />
  </g>

  <!-- ════════ BACKGROUND 3D AI QUANTUM ARC REACTOR ════════ -->
  <!-- Outer Ring -->
  <g class="ring-1" opacity="0.45">
    <circle cx="500" cy="130" r="115" stroke="#00FF41" stroke-width="2.5" stroke-dasharray="30 15 5 15" fill="none"/>
    <circle cx="500" cy="130" r="125" stroke="#00E5FF" stroke-width="1.5" stroke-dasharray="50 25" fill="none"/>
  </g>

  <!-- Mid Ring -->
  <g class="ring-2" opacity="0.65">
    <circle cx="500" cy="130" r="85" stroke="#00FF41" stroke-width="3" stroke-dasharray="20 12" fill="none"/>
    <circle cx="500" cy="45" r="4" fill="#00FF41"/>
    <circle cx="500" cy="215" r="4" fill="#00FF41"/>
    <circle cx="415" cy="130" r="4" fill="#00E5FF"/>
    <circle cx="585" cy="130" r="4" fill="#00E5FF"/>
  </g>

  <!-- Inner High-Velocity Ring -->
  <g class="ring-3" opacity="0.85">
    <circle cx="500" cy="130" r="58" stroke="#39FF14" stroke-width="2.5" stroke-dasharray="14 8" fill="none"/>
  </g>

  <!-- Plasma Core Glow -->
  <circle cx="500" cy="130" r="52" fill="url(#reactor-plasma)" />

  <!-- Core Icosahedron Center -->
  <g class="fusion-core" filter="url(#core-glow)">
    <circle cx="500" cy="130" r="22" fill="#00FF41" opacity="0.95"/>
    <circle cx="500" cy="130" r="10" fill="#FFFFFF"/>
  </g>

  <!-- ════════ FOREGROUND TITLE & SUBTITLE ════════ -->
  <g filter="url(#neon-glow)">
    <text x="500" y="145" text-anchor="middle" class="title-text">VARUN S</text>
  </g>

  <g filter="url(#neon-glow)">
    <text x="500" y="210" text-anchor="middle" class="sub-text">⚡ AI ENGINEER  •  NEURAL ARCHITECT  •  SYSTEM BUILDER</text>
  </g>
</svg>
