<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 20" fill="none">
  <defs>
    <style>
      @keyframes pulse { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }
      @keyframes scan { 0% { transform: translateX(-200px); } 100% { transform: translateX(1400px); } }
      @keyframes glow { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.7; } }
      @keyframes dash { 0% { stroke-dashoffset: 20; } 100% { stroke-dashoffset: 0; } }
      .base-line { stroke: #003300; stroke-width: 0.5; }
      .active-line { stroke: #00FF41; stroke-width: 1; opacity: 0.4; stroke-dasharray: 8 4; animation: dash 2s linear infinite; }
      .d1 { fill: #00FF41; animation: pulse 2s infinite; }
      .d2 { fill: #00FF41; animation: pulse 2s infinite; animation-delay: 0.4s; }
      .d3 { fill: #00FF41; animation: pulse 2s infinite; animation-delay: 0.8s; }
      .d4 { fill: #00FFFF; animation: pulse 2s infinite; animation-delay: 0.2s; }
      .d5 { fill: #00FFFF; animation: pulse 2s infinite; animation-delay: 0.6s; }
      .scanner { fill: #00FF41; opacity: 0.08; animation: scan 3s linear infinite; }
      .hex { font-family: 'Courier New', monospace; font-size: 7px; fill: #003300; animation: glow 5s infinite; }
      .hex2 { font-family: 'Courier New', monospace; font-size: 7px; fill: #003300; animation: glow 5s infinite; animation-delay: 2.5s; }
    </style>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0D1117;stop-opacity:1"/>
      <stop offset="35%" style="stop-color:#003300;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#00FF41;stop-opacity:1"/>
      <stop offset="65%" style="stop-color:#003300;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0D1117;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Base structure -->
  <line x1="0" y1="10" x2="1200" y2="10" class="base-line"/>
  <line x1="100" y1="10" x2="1100" y2="10" class="active-line"/>
  <!-- Gradient glow bar -->
  <rect x="0" y="8" width="1200" height="4" fill="url(#g1)" opacity="0.4" rx="2"/>
  <!-- Scanner beam -->
  <rect class="scanner" x="0" y="4" width="120" height="12" rx="6"/>
  <!-- Center constellation -->
  <circle cx="540" cy="10" r="1.5" class="d4"/>
  <circle cx="565" cy="10" r="1.5" class="d1"/>
  <circle cx="590" cy="10" r="2.5" class="d2"/>
  <circle cx="600" cy="10" r="3.5" class="d3"/>
  <circle cx="610" cy="10" r="2.5" class="d2"/>
  <circle cx="635" cy="10" r="1.5" class="d1"/>
  <circle cx="660" cy="10" r="1.5" class="d5"/>
  <!-- Hex decorations -->
  <text x="50" y="13" class="hex">0x4E455552414C</text>
  <text x="1070" y="13" class="hex2">0x4F50455241</text>
</svg>
