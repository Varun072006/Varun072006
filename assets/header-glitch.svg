<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 80" fill="none">
  <defs>
    <style>
      @keyframes glitch1 {
        0%, 100% { transform: translate(0, 0); }
        7% { transform: translate(-3px, 2px); }
        10% { transform: translate(3px, -1px); }
        27% { transform: translate(-2px, -2px); }
        30% { transform: translate(2px, 3px); }
        47% { transform: translate(-1px, -1px); }
        50% { transform: translate(3px, 1px); }
        67% { transform: translate(-3px, -3px); }
        70% { transform: translate(2px, 2px); }
        87% { transform: translate(-2px, 1px); }
        90% { transform: translate(1px, -2px); }
      }
      @keyframes glitch2 {
        0%, 100% { transform: translate(0, 0); }
        12% { transform: translate(2px, -3px); }
        22% { transform: translate(-3px, 2px); }
        32% { transform: translate(1px, -1px); }
        42% { transform: translate(-2px, 3px); }
        52% { transform: translate(3px, -2px); }
        62% { transform: translate(-1px, 1px); }
        72% { transform: translate(2px, -3px); }
        82% { transform: translate(-3px, 2px); }
        92% { transform: translate(1px, -1px); }
      }
      @keyframes flicker {
        0%, 19.999%, 22%, 62.999%, 64%, 64.999%, 70%, 100% { opacity: 0.99; }
        20%, 21.999%, 63%, 63.999%, 65%, 69.999% { opacity: 0.4; }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 1; }
      }
      @keyframes scanmove {
        0% { transform: translateY(-10px); }
        100% { transform: translateY(90px); }
      }
      .main { font-family: 'Courier New', Courier, monospace; font-weight: bold; font-size: 40px; fill: #00FF41; text-anchor: middle; animation: flicker 5s infinite; }
      .red { font-family: 'Courier New', Courier, monospace; font-weight: bold; font-size: 40px; fill: #FF0040; text-anchor: middle; opacity: 0.7; animation: glitch1 3s infinite; }
      .cyan { font-family: 'Courier New', Courier, monospace; font-weight: bold; font-size: 40px; fill: #00FFFF; text-anchor: middle; opacity: 0.5; animation: glitch2 4s infinite; }
      .sub { font-family: 'Courier New', Courier, monospace; font-size: 11px; fill: #0FFF50; text-anchor: middle; animation: pulse 3s infinite; letter-spacing: 2px; }
      .bracket { fill: #00FFFF; }
      .scan { fill: #00FF41; opacity: 0.03; animation: scanmove 4s linear infinite; }
      .corner { stroke: #00FF41; stroke-width: 1; fill: none; opacity: 0.4; }
      .blink { animation: flicker 2s infinite; }
    </style>
  </defs>
  <rect width="800" height="80" fill="#0D1117" rx="6"/>
  <!-- Scanline -->
  <rect class="scan" width="800" height="3" y="0"/>
  <!-- Corner decorations -->
  <polyline points="2,15 2,2 15,2" class="corner"/>
  <polyline points="785,2 798,2 798,15" class="corner"/>
  <polyline points="2,65 2,78 15,78" class="corner"/>
  <polyline points="785,78 798,78 798,65" class="corner"/>
  <!-- Glitch layers -->
  <text x="400" y="40" class="red">AI  ENGINEER</text>
  <text x="400" y="40" class="cyan">AI  ENGINEER</text>
  <text x="400" y="40" class="main">AI  ENGINEER</text>
  <!-- Subtitle -->
  <text x="400" y="65" class="sub">
    <tspan class="bracket">⟨</tspan> GNN · COMPUTER VISION · LLM · RAG · AGENTIC AI <tspan class="bracket">⟩</tspan>
  </text>
  <!-- Status indicators -->
  <circle cx="20" cy="10" r="3" fill="#00FF41" class="blink"/>
  <circle cx="780" cy="10" r="3" fill="#00FF41" class="blink" style="animation-delay: 1s;"/>
  <circle cx="20" cy="70" r="3" fill="#FF0040" opacity="0.5" class="blink" style="animation-delay: 0.5s;"/>
  <circle cx="780" cy="70" r="3" fill="#00FFFF" opacity="0.5" class="blink" style="animation-delay: 1.5s;"/>
</svg>
