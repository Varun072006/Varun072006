<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340" fill="none">
  <defs>
    <!-- Multi-Color Gradient Palettes -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050714" />
      <stop offset="50%" stop-color="#0a0d24" />
      <stop offset="100%" stop-color="#04020a" />
    </linearGradient>

    <!-- Cyber Ring Gradients -->
    <linearGradient id="ring-grad-1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F0FF" />
      <stop offset="50%" stop-color="#7000FF" />
      <stop offset="100%" stop-color="#FF007A" />
    </linearGradient>

    <linearGradient id="ring-grad-2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFB703" />
      <stop offset="50%" stop-color="#00FF88" />
      <stop offset="100%" stop-color="#00F0FF" />
    </linearGradient>

    <linearGradient id="core-glow-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F0FF" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#9D4EDD" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FF007A" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="laser-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F0FF" stop-opacity="0" />
      <stop offset="30%" stop-color="#00F0FF" stop-opacity="0.9" />
      <stop offset="70%" stop-color="#FF007A" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#FF007A" stop-opacity="0" />
    </linearGradient>

    <!-- Filters for Intense 3D Glow -->
    <filter id="glow-cyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="glow-magenta" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="glow-gold" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <clipPath id="panel-clip">
      <rect x="2" y="2" width="876" height="336" rx="16" />
    </clipPath>
  </defs>

  <style>
    /* CSS Animations for 3D Cyber Core */
    @keyframes spinClockwise {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes spinCounter {
      0% { transform: rotate(360deg); }
      100% { transform: rotate(0deg); }
    }
    @keyframes pulseScale {
      0%, 100% { transform: scale(1); opacity: 0.85; }
      50% { transform: scale(1.12); opacity: 1; filter: drop-shadow(0 0 15px #00F0FF); }
    }
    @keyframes floatParticle {
      0%, 100% { transform: translateY(0px) scale(1); opacity: 0.7; }
      50% { transform: translateY(-12px) scale(1.3); opacity: 1; }
    }
    @keyframes scanline {
      0% { transform: translateX(-400px); }
      100% { transform: translateX(880px); }
    }
    @keyframes borderGlow {
      0%, 100% { stroke: #00F0FF; stroke-opacity: 0.5; }
      33% { stroke: #7000FF; stroke-opacity: 0.8; }
      66% { stroke: #FF007A; stroke-opacity: 0.8; }
    }
    @keyframes barPulse {
      0%, 100% { height: 15px; opacity: 0.5; }
      50% { height: 45px; opacity: 1; }
    }

    .main-border { animation: borderGlow 6s infinite ease-in-out; }
    .ring-rot-1 { transform-origin: 440px 170px; animation: spinClockwise 18s linear infinite; }
    .ring-rot-2 { transform-origin: 440px 170px; animation: spinCounter 12s linear infinite; }
    .ring-rot-3 { transform-origin: 440px 170px; animation: spinClockwise 8s linear infinite; }
    .core-pulse { transform-origin: 440px 170px; animation: pulseScale 3.5s infinite ease-in-out; }
    .p-float { animation: floatParticle 3s infinite ease-in-out; }
    .scan-line { animation: scanline 4s linear infinite; }
  </style>

  <!-- Canvas Background -->
  <rect x="2" y="2" width="876" height="336" rx="16" fill="url(#bg-grad)" class="main-border" stroke="#00F0FF" stroke-width="1.5" />

  <!-- 3D Perspective Grid Background Lines -->
  <g opacity="0.15" stroke="#00F0FF" stroke-width="1">
    <!-- Horizontal Grid Lines -->
    <line x1="0" y1="60" x2="880" y2="60" />
    <line x1="0" y1="120" x2="880" y2="120" />
    <line x1="0" y1="180" x2="880" y2="180" />
    <line x1="0" y1="240" x2="880" y2="240" />
    <line x1="0" y1="300" x2="880" y2="300" />

    <!-- Perspective Converging Lines to Center -->
    <line x1="0" y1="0" x2="440" y2="170" />
    <line x1="880" y1="0" x2="440" y2="170" />
    <line x1="0" y1="340" x2="440" y2="170" />
    <line x1="880" y1="340" x2="440" y2="170" />
    <line x1="440" y1="0" x2="440" y2="340" />
    <line x1="0" y1="170" x2="880" y2="170" />
  </g>

  <!-- Laser Scanline Beam -->
  <g clip-path="url(#panel-clip)">
    <rect class="scan-line" x="0" y="2" width="450" height="2" fill="url(#laser-grad)" />
    <rect class="scan-line" x="0" y="336" width="450" height="2" fill="url(#laser-grad)" />
  </g>

  <!-- Four Vivid Multi-Color Corner Accent Dots -->
  <circle cx="20" cy="20" r="5" fill="#00F0FF" filter="url(#glow-cyan)"/>
  <circle cx="860" cy="20" r="5" fill="#FF007A" filter="url(#glow-magenta)"/>
  <circle cx="20" cy="320" r="5" fill="#FFB703" filter="url(#glow-gold)"/>
  <circle cx="860" cy="320" r="5" fill="#00FF88" filter="url(#glow-cyan)"/>

  <!-- Flanking Equalizer / Visualizer Height Bars (Left & Right) -->
  <g fill="#00F0FF" opacity="0.8">
    <rect x="60" y="150" width="4" height="40" rx="2" fill="#00F0FF" filter="url(#glow-cyan)"/>
    <rect x="72" y="130" width="4" height="80" rx="2" fill="#7000FF"/>
    <rect x="84" y="145" width="4" height="50" rx="2" fill="#FF007A" filter="url(#glow-magenta)"/>
    <rect x="96" y="160" width="4" height="20" rx="2" fill="#00FF88"/>
  </g>

  <g fill="#FF007A" opacity="0.8">
    <rect x="784" y="160" width="4" height="20" rx="2" fill="#00FF88"/>
    <rect x="796" y="145" width="4" height="50" rx="2" fill="#00F0FF" filter="url(#glow-cyan)"/>
    <rect x="808" y="130" width="4" height="80" rx="2" fill="#7000FF"/>
    <rect x="820" y="150" width="4" height="40" rx="2" fill="#FF007A" filter="url(#glow-magenta)"/>
  </g>

  <!-- Floating 3D Quantum Particles -->
  <circle cx="220" cy="90" r="3" fill="#00F0FF" class="p-float" filter="url(#glow-cyan)"/>
  <circle cx="660" cy="80" r="4" fill="#FF007A" class="p-float" filter="url(#glow-magenta)"/>
  <circle cx="280" cy="260" r="3.5" fill="#FFB703" class="p-float" filter="url(#glow-gold)"/>
  <circle cx="600" cy="270" r="3" fill="#00FF88" class="p-float" filter="url(#glow-cyan)"/>
  <circle cx="160" cy="220" r="2.5" fill="#7000FF" class="p-float"/>
  <circle cx="720" cy="110" r="3" fill="#00F0FF" class="p-float"/>

  <!-- ================= CENTERPIECE: ABSTRACT 3D CYBERNETIC NEURAL CORE ================= -->

  <!-- Ambient Radial Glow Behind Core -->
  <circle cx="440" cy="170" r="140" fill="url(#core-glow-grad)" opacity="0.8"/>

  <!-- Outer Segmented 3D Ring 1 (Cyan to Magenta Gradient) -->
  <g class="ring-rot-1">
    <circle cx="440" cy="170" r="120" stroke="url(#ring-grad-1)" stroke-width="2.5" stroke-dasharray="25 15 60 20 10 30" fill="none" filter="url(#glow-cyan)"/>
    <circle cx="440" cy="170" r="130" stroke="#00F0FF" stroke-width="1" stroke-dasharray="4 12 8 20" stroke-opacity="0.6" fill="none"/>
  </g>

  <!-- Middle Counter-Rotating 3D Ring 2 (Gold to Emerald Gradient) -->
  <g class="ring-rot-2">
    <circle cx="440" cy="170" r="95" stroke="url(#ring-grad-2)" stroke-width="3" stroke-dasharray="40 20 80 15" fill="none" filter="url(#glow-gold)"/>
    <!-- Outer Node Dots on Ring -->
    <circle cx="440" cy="75" r="5" fill="#FFB703" filter="url(#glow-gold)"/>
    <circle cx="535" cy="170" r="5" fill="#00FF88" filter="url(#glow-cyan)"/>
    <circle cx="440" cy="265" r="5" fill="#00F0FF" filter="url(#glow-cyan)"/>
    <circle cx="345" cy="170" r="5" fill="#FF007A" filter="url(#glow-magenta)"/>
  </g>

  <!-- Inner Fast Rotating Geometry Ring 3 -->
  <g class="ring-rot-3">
    <polygon points="440,105 496,137 496,203 440,235 384,203 384,137" stroke="#00F0FF" stroke-width="1.5" stroke-dasharray="15 8" fill="none" filter="url(#glow-cyan)"/>
  </g>

  <!-- Isometric 3D Hyper-Cube / Octahedron Core Wireframe (Stationary / Pulsing) -->
  <g class="core-pulse">
    <!-- Inner Octahedron / Cube Structure -->
    <!-- Front Face -->
    <polygon points="440,120 480,145 480,195 440,220 400,195 400,145" stroke="#FF007A" stroke-width="2" fill="#7000FF" fill-opacity="0.15" filter="url(#glow-magenta)"/>
    
    <!-- Top 3D Cap -->
    <polygon points="440,120 480,145 440,170 400,145" fill="#00F0FF" fill-opacity="0.3" stroke="#00F0FF" stroke-width="1.5"/>
    
    <!-- Right 3D Face -->
    <polygon points="480,145 480,195 440,220 440,170" fill="#7000FF" fill-opacity="0.4" stroke="#7000FF" stroke-width="1.5"/>

    <!-- Left 3D Face -->
    <polygon points="400,145 400,195 440,220 440,170" fill="#FF007A" fill-opacity="0.3" stroke="#FF007A" stroke-width="1.5"/>

    <!-- Internal Hyper-Spoke Lines to Center Vertex -->
    <line x1="440" y1="120" x2="440" y2="220" stroke="#00FF88" stroke-width="1.5" stroke-dasharray="4 2"/>
    <line x1="400" y1="145" x2="480" y2="195" stroke="#00FF88" stroke-width="1.5" stroke-dasharray="4 2"/>
    <line x1="480" y1="145" x2="400" y2="195" stroke="#00FF88" stroke-width="1.5" stroke-dasharray="4 2"/>

    <!-- Luminous Central Energy Node -->
    <circle cx="440" cy="170" r="16" fill="#00F0FF" filter="url(#glow-cyan)"/>
    <circle cx="440" cy="170" r="9" fill="#FFFFFF"/>
  </g>
</svg>
