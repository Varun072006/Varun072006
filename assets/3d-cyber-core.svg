<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340" fill="none">
  <defs>
    <!-- Glowing Filters -->
    <filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5" result="blur1" />
      <feGaussianBlur stdDeviation="8" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <filter id="core-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Gradients -->
    <linearGradient id="laser-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00FF41" stop-opacity="0" />
      <stop offset="50%" stop-color="#00FF41" stop-opacity="1" />
      <stop offset="100%" stop-color="#00FF41" stop-opacity="0" />
    </linearGradient>

    <radialGradient id="orb-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#39FF14" stop-opacity="1" />
      <stop offset="50%" stop-color="#00FF41" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#003300" stop-opacity="0" />
    </radialGradient>

    <clipPath id="panel-clip">
      <rect x="2" y="2" width="876" height="336" rx="14" />
    </clipPath>
  </defs>

  <style>
    @keyframes rotateRing1 {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes rotateRing2 {
      0% { transform: rotate(360deg); }
      100% { transform: rotate(0deg); }
    }
    @keyframes corePulse {
      0%, 100% { transform: scale(1); opacity: 0.85; }
      50% { transform: scale(1.18); opacity: 1; }
    }
    @keyframes borderPulse {
      0%, 100% { stroke-opacity: 0.4; stroke: #00FF41; }
      50% { stroke-opacity: 1; stroke: #00FF66; }
    }
    @keyframes laserScan {
      0% { transform: translateX(-400px); }
      100% { transform: translateX(880px); }
    }
    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
    @keyframes tagGlow {
      0%, 100% { fill: #00FF41; opacity: 0.9; }
      50% { fill: #39FF14; opacity: 1; }
    }

    .panel-bg { fill: #050811; }
    .panel-border { animation: borderPulse 3s infinite ease-in-out; }
    .ring1 { transform-origin: 440px 170px; animation: rotateRing1 14s linear infinite; }
    .ring2 { transform-origin: 440px 170px; animation: rotateRing2 9s linear infinite; }
    .ring3 { transform-origin: 440px 170px; animation: rotateRing1 20s linear infinite; }
    .core-orb { transform-origin: 440px 170px; animation: corePulse 3s infinite ease-in-out; }
    .laser-line { animation: laserScan 4s linear infinite; }
    .hud-title { font-family: 'JetBrains Mono', 'Fira Code', monospace; fill: #00FF41; font-size: 26px; font-weight: 900; letter-spacing: 6px; animation: tagGlow 2.5s infinite ease-in-out; }
    .hud-sub { font-family: 'JetBrains Mono', 'Fira Code', monospace; fill: #00FF41; font-size: 12px; font-weight: 700; letter-spacing: 3px; opacity: 0.95; }
    .hud-code { font-family: 'JetBrains Mono', 'Fira Code', monospace; fill: #00FF41; font-size: 10px; font-weight: 500; opacity: 0.65; }
    .cursor { animation: blink 0.8s infinite; fill: #00FF41; }
    .node-text { font-family: 'JetBrains Mono', monospace; font-size: 10px; fill: #00FF41; font-weight: 700; }
  </style>

  <!-- Dark Background Frame -->
  <rect x="2" y="2" width="876" height="336" rx="14" class="panel-bg panel-border" stroke="#00FF41" stroke-width="1.5" />

  <!-- Laser Scanlines -->
  <g clip-path="url(#panel-clip)">
    <rect class="laser-line" x="0" y="2" width="350" height="2" fill="url(#laser-grad)" />
    <rect class="laser-line" x="0" y="336" width="350" height="2" fill="url(#laser-grad)" />

    <!-- 3D Perspective Grid Floor -->
    <g opacity="0.25">
      <!-- Perspective Grid Lines converging to horizon -->
      <line x1="440" y1="170" x2="40" y2="340" stroke="#00FF41" stroke-width="1" />
      <line x1="440" y1="170" x2="160" y2="340" stroke="#00FF41" stroke-width="1" />
      <line x1="440" y1="170" x2="280" y2="340" stroke="#00FF41" stroke-width="1" />
      <line x1="440" y1="170" x2="400" y2="340" stroke="#00FF41" stroke-width="1" />
      <line x1="440" y1="170" x2="480" y2="340" stroke="#00FF41" stroke-width="1" />
      <line x1="440" y1="170" x2="600" y2="340" stroke="#00FF41" stroke-width="1" />
      <line x1="440" y1="170" x2="720" y2="340" stroke="#00FF41" stroke-width="1" />
      <line x1="440" y1="170" x2="840" y2="340" stroke="#00FF41" stroke-width="1" />
      
      <!-- Horizontal Floor Rings -->
      <ellipse cx="440" cy="220" rx="160" ry="25" fill="none" stroke="#00FF41" stroke-width="0.8" />
      <ellipse cx="440" cy="260" rx="280" ry="45" fill="none" stroke="#00FF41" stroke-width="0.8" />
      <ellipse cx="440" cy="300" rx="400" ry="65" fill="none" stroke="#00FF41" stroke-width="0.8" />
    </g>

    <!-- Top Left HUD Metrics -->
    <text x="25" y="32" class="hud-code">[ SYS_VERSION: 4.0.9_NEURAL_CORE ]</text>
    <text x="25" y="48" class="hud-code">[ GRAPH_NODES: 10,000+ TENSORS ]</text>
    <text x="25" y="64" class="hud-code">[ ARCHITECTURE: HYPERGRAPH GNN ]</text>

    <!-- Top Right HUD Metrics -->
    <text x="855" y="32" class="hud-code" text-anchor="end">[ STATUS: 3D_RENDER_ONLINE ]</text>
    <text x="855" y="48" class="hud-code" text-anchor="end">[ FREQUENCY: 144Hz SYNAPSE ]</text>
    <text x="855" y="64" class="hud-code" text-anchor="end">[ LOC: BANNARI_AMMAN_BIT ]</text>

    <!-- Corner Accent Brackets -->
    <path d="M 16 30 L 16 16 L 30 16" stroke="#00FF41" stroke-width="2" fill="none" />
    <path d="M 864 30 L 864 16 L 850 16" stroke="#00FF41" stroke-width="2" fill="none" />
    <path d="M 16 310 L 16 324 L 30 324" stroke="#FF3366" stroke-width="2" fill="none" />
    <path d="M 864 310 L 864 324 L 850 324" stroke="#00E5FF" stroke-width="2" fill="none" />
  </g>

  <!-- ================= 3D ANIMATED NEURAL CORE ================= -->
  <g filter="url(#neon-glow)">
    <!-- Outer Gyroscope Ring 1 -->
    <ellipse cx="440" cy="170" rx="120" ry="40" fill="none" stroke="#00FF41" stroke-width="1.8" stroke-dasharray="15 8 5 8" class="ring1" />
    
    <!-- Middle Gyroscope Ring 2 -->
    <ellipse cx="440" cy="170" rx="95" ry="95" fill="none" stroke="#00FF66" stroke-width="1.5" stroke-dasharray="25 10 10 10" class="ring2" />
    
    <!-- Inner Octagonal Ring 3 -->
    <ellipse cx="440" cy="170" rx="70" ry="25" fill="none" stroke="#39FF14" stroke-width="1.2" stroke-dasharray="8 4" class="ring3" />
    
    <!-- Central Pulsing Holographic Orb -->
    <circle cx="440" cy="170" r="32" fill="url(#orb-grad)" class="core-orb" filter="url(#core-glow)" />
    <circle cx="440" cy="170" r="14" fill="#00FF41" class="core-orb" />
  </g>

  <!-- Floating Holographic Neural Nodes around Core -->
  <g filter="url(#neon-glow)" opacity="0.95">
    <!-- Node 1: GNN -->
    <line x1="440" y1="170" x2="270" y2="120" stroke="#00FF41" stroke-width="1" stroke-dasharray="3 3" />
    <circle cx="270" cy="120" r="4" fill="#00FF41" />
    <rect x="230" y="102" width="55" height="18" rx="4" fill="#050811" stroke="#00FF41" stroke-width="1" />
    <text x="257" y="114" class="node-text" text-anchor="middle">🔮 GNN</text>

    <!-- Node 2: LLM -->
    <line x1="440" y1="170" x2="610" y2="120" stroke="#00FF41" stroke-width="1" stroke-dasharray="3 3" />
    <circle cx="610" cy="120" r="4" fill="#00FF41" />
    <rect x="590" y="102" width="55" height="18" rx="4" fill="#050811" stroke="#00FF41" stroke-width="1" />
    <text x="617" y="114" class="node-text" text-anchor="middle">🧠 LLM</text>

    <!-- Node 3: CV -->
    <line x1="440" y1="170" x2="250" y2="210" stroke="#00FF41" stroke-width="1" stroke-dasharray="3 3" />
    <circle cx="250" cy="210" r="4" fill="#00FF41" />
    <rect x="215" y="218" width="55" height="18" rx="4" fill="#050811" stroke="#00FF41" stroke-width="1" />
    <text x="242" y="230" class="node-text" text-anchor="middle">👁️ CV</text>

    <!-- Node 4: AGENTIC AI -->
    <line x1="440" y1="170" x2="630" y2="210" stroke="#00FF41" stroke-width="1" stroke-dasharray="3 3" />
    <circle cx="630" cy="210" r="4" fill="#00FF41" />
    <rect x="595" y="218" width="80" height="18" rx="4" fill="#050811" stroke="#00FF41" stroke-width="1" />
    <text x="635" y="230" class="node-text" text-anchor="middle">⚡ AGENTIC</text>
  </g>

  <!-- Central Title Header Banner Text Overlay -->
  <g filter="url(#neon-glow)" text-anchor="middle">
    <text x="440" y="65" class="hud-title">VARUN S</text>
    <text x="440" y="88" class="hud-sub">⚡ 3D NEURAL ARCHITECT &amp; AI SYSTEMS ENGINEER<tspan class="cursor">_</tspan></text>
  </g>

  <!-- Bottom Interactive Status Badge Line -->
  <text x="440" y="308" class="hud-sub" text-anchor="middle" font-size="11">[ DEPLOYING MULTI-AGENT ORCHESTRATION &amp; TEMPORAL GNNs ]</text>
</svg>
