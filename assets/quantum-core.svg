<svg xmlns="http://www.w3.org/2000/svg" width="880" height="280" viewBox="0 0 880 280" fill="none">
  <defs>
    <!-- Quantum Glow Filters -->
    <filter id="core-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur1" />
      <feGaussianBlur stdDeviation="3" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Gradients -->
    <radialGradient id="plasma-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#39FF14" stop-opacity="1" />
      <stop offset="40%" stop-color="#00FF41" stop-opacity="0.8" />
      <stop offset="80%" stop-color="#00E5FF" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#00FF41" stop-opacity="0" />
    </radialGradient>

    <linearGradient id="scan-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00FF41" stop-opacity="0" />
      <stop offset="50%" stop-color="#00FF41" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#00FF41" stop-opacity="0" />
    </linearGradient>

    <clipPath id="panel-clip">
      <rect x="2" y="2" width="876" height="276" rx="14" />
    </clipPath>
  </defs>

  <style>
    @keyframes borderPulse {
      0%, 100% { stroke-opacity: 0.4; stroke: #00FF41; }
      50% { stroke-opacity: 1; stroke: #00FF66; }
    }
    @keyframes spinClockwise {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes spinCounter {
      0% { transform: rotate(360deg); }
      100% { transform: rotate(0deg); }
    }
    @keyframes corePulse {
      0%, 100% { transform: scale(1); opacity: 0.85; }
      50% { transform: scale(1.18); opacity: 1; }
    }
    @keyframes scanline {
      0% { transform: translateX(-400px); }
      100% { transform: translateX(880px); }
    }
    @keyframes textGlow {
      0%, 100% { fill: #00FF41; opacity: 0.9; }
      50% { fill: #39FF14; opacity: 1; }
    }
    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }

    .panel-border { animation: borderPulse 3.5s infinite ease-in-out; }
    .scan-line { animation: scanline 4s linear infinite; }
    .core-pulse { transform-origin: 440px 140px; animation: corePulse 2.5s infinite ease-in-out; }
    .ring-spin-1 { transform-origin: 440px 140px; animation: spinClockwise 12s linear infinite; }
    .ring-spin-2 { transform-origin: 440px 140px; animation: spinCounter 8s linear infinite; }
    .ring-spin-3 { transform-origin: 440px 140px; animation: spinClockwise 16s linear infinite; }
    .header-text { animation: textGlow 3s infinite ease-in-out; }
    .cursor { animation: blink 0.8s infinite; fill: #00FF41; }
  </style>

  <!-- Cyber Container -->
  <rect x="2" y="2" width="876" height="276" rx="14" fill="#05080f" class="panel-border" stroke="#00FF41" stroke-width="1.5" />

  <!-- Laser Scanlines -->
  <g clip-path="url(#panel-clip)">
    <rect class="scan-line" x="0" y="2" width="400" height="2" fill="url(#scan-grad)" />
    <rect class="scan-line" x="0" y="276" width="400" height="2" fill="url(#scan-grad)" />
  </g>

  <!-- Four Corner Accent Dots -->
  <circle cx="16" cy="16" r="4.5" fill="#00FF41" filter="url(#core-glow)"/>
  <circle cx="864" cy="16" r="4.5" fill="#00FF41" filter="url(#core-glow)"/>
  <circle cx="16" cy="264" r="4.5" fill="#FF3366" filter="url(#core-glow)"/>
  <circle cx="864" cy="264" r="4.5" fill="#00E5FF" filter="url(#core-glow)"/>

  <!-- ================= 3D AI QUANTUM FUSION CORE CENTERPIECE ================= -->
  
  <!-- Outer Plasma Aura -->
  <circle cx="440" cy="140" r="100" fill="url(#plasma-grad)" />

  <!-- Gyroscopic Ring 3 (Outer Ring) -->
  <g class="ring-spin-3">
    <ellipse cx="440" cy="140" rx="95" ry="32" fill="none" stroke="#00FF41" stroke-width="1.5" stroke-dasharray="25 15 45 10" opacity="0.75" filter="url(#core-glow)" />
    <circle cx="535" cy="140" r="4" fill="#00E5FF" filter="url(#core-glow)" />
    <circle cx="345" cy="140" r="4" fill="#00E5FF" filter="url(#core-glow)" />
  </g>

  <!-- Gyroscopic Ring 2 (Middle Ring Tilted) -->
  <g class="ring-spin-2">
    <ellipse cx="440" cy="140" rx="72" ry="72" fill="none" stroke="#00E5FF" stroke-width="2" stroke-dasharray="40 20 60 15" opacity="0.85" filter="url(#core-glow)" />
    <circle cx="440" cy="68" r="4.5" fill="#39FF14" filter="url(#core-glow)" />
    <circle cx="440" cy="212" r="4.5" fill="#39FF14" filter="url(#core-glow)" />
  </g>

  <!-- Gyroscopic Ring 1 (Inner Segmented Ring) -->
  <g class="ring-spin-1">
    <ellipse cx="440" cy="140" rx="48" ry="48" fill="none" stroke="#00FF41" stroke-width="2.5" stroke-dasharray="18 12 30 10" filter="url(#core-glow)" />
    <circle cx="488" cy="140" r="3.5" fill="#00FF41" />
    <circle cx="392" cy="140" r="3.5" fill="#00FF41" />
  </g>

  <!-- Inner Plasma Core Sphere -->
  <g class="core-pulse">
    <circle cx="440" cy="140" r="24" fill="#39FF14" filter="url(#core-glow)" opacity="0.95" />
    <circle cx="440" cy="140" r="14" fill="#FFFFFF" filter="url(#core-glow)" />
  </g>

  <!-- Left Side Telemetry Text -->
  <g font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="12" fill="#8b949e">
    <text x="35" y="110" font-weight="700" fill="#00FF41">&gt; SYSTEM: QUANTUM_CORE_2050</text>
    <text x="35" y="135">&gt; REACTION: D-HE3 FUSION</text>
    <text x="35" y="160">&gt; PLASMA_TEMP: 1.5e8 K</text>
    <text x="35" y="185">&gt; OUTPUT: 1.21 GW</text>
  </g>

  <!-- Right Side Telemetry Text -->
  <g font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="12" fill="#8b949e" text-anchor="end">
    <text x="845" y="110" font-weight="700" fill="#00FF41">STATUS: OPERATIONAL &lt;</text>
    <text x="845" y="135">FIELD: STABLE_MAGNETIC &lt;</text>
    <text x="845" y="160">CONTAINMENT: 99.99% &lt;</text>
    <text x="845" y="185">COMPUTE: GNN / LLM / CV &lt;</text>
  </g>

  <!-- Bottom Title -->
  <g filter="url(#neon-glow)">
    <text x="440" y="255" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="14" font-weight="800" text-anchor="middle" letter-spacing="3" class="header-text">⚡ AI QUANTUM FUSION CORE — 2050 EDITION<tspan class="cursor">_</tspan></text>
  </g>
</svg>
