<svg xmlns="http://www.w3.org/2000/svg" width="750" height="150" viewBox="0 0 750 150" fill="none">
  <defs>
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="dot-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <linearGradient id="scan-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00FF41" stop-opacity="0" />
      <stop offset="50%" stop-color="#00FF41" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#00FF41" stop-opacity="0" />
    </linearGradient>
    <clipPath id="box-clip">
      <rect x="2" y="2" width="746" height="146" rx="10" />
    </clipPath>
  </defs>

  <style>
    @keyframes borderPulse {
      0%, 100% { stroke-opacity: 0.4; stroke: #00FF41; }
      50% { stroke-opacity: 1; stroke: #00FF66; }
    }
    @keyframes textGlow {
      0%, 100% { fill: #00FF41; opacity: 0.9; }
      50% { fill: #39FF14; opacity: 1; }
    }
    @keyframes scanline {
      0% { transform: translateX(-350px); }
      100% { transform: translateX(750px); }
    }
    @keyframes cursorBlink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }

    .box-border { animation: borderPulse 3s infinite ease-in-out; }
    .quote-text { fill: #00FF41; font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 14px; font-weight: 700; }
    .status-text { fill: #c9d1d9; font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 12.5px; font-weight: 500; }
    .status-val { fill: #00FF41; font-weight: 700; }
    .scan-line { animation: scanline 4s linear infinite; }
    .cursor { animation: cursorBlink 0.8s infinite; fill: #00FF41; }
  </style>

  <!-- Container Box -->
  <rect x="2" y="2" width="746" height="146" rx="10" fill="#090d16" class="box-border" stroke="#00FF41" stroke-width="1.5" />

  <!-- Laser Scanlines -->
  <g clip-path="url(#box-clip)">
    <rect class="scan-line" x="0" y="2" width="350" height="2" fill="url(#scan-grad)" />
    <rect class="scan-line" x="0" y="146" width="350" height="2" fill="url(#scan-grad)" />
  </g>

  <!-- Four Corner Accent Dots -->
  <circle cx="16" cy="16" r="4" fill="#00FF41" filter="url(#dot-glow)"/>
  <circle cx="734" cy="16" r="4" fill="#00FF41" filter="url(#dot-glow)"/>
  <circle cx="16" cy="134" r="4" fill="#FF3366" filter="url(#dot-glow)"/>
  <circle cx="734" cy="134" r="4" fill="#00E5FF" filter="url(#dot-glow)"/>

  <!-- Quote Lines -->
  <g filter="url(#neon-glow)">
    <text x="375" y="42" text-anchor="middle" class="quote-text">⚡ &quot;I don't just write code — I architect systems</text>
    <text x="375" y="62" text-anchor="middle" class="quote-text">that think, learn, and scale.&quot;</text>
  </g>

  <!-- Status Rows -->
  <text x="375" y="96" text-anchor="middle" class="status-text">&gt; connection_status: <tspan class="status-val">AWAITING_INPUT</tspan><tspan class="cursor">_</tspan></text>
  <text x="375" y="120" text-anchor="middle" class="status-text">&gt; uptime: <tspan class="status-val">99.99%</tspan>  │  &gt; next_build: <tspan class="status-val">IN_PROGRESS...</tspan></text>
</svg>
