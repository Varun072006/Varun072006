<svg xmlns="http://www.w3.org/2000/svg" width="800" height="380" viewBox="0 0 800 380" fill="none">
  <defs>
    <!-- Deep Core Glow Filters -->
    <filter id="core-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur1" />
      <feGaussianBlur stdDeviation="15" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="hyper-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="25" result="largeBlur" />
      <feMerge>
        <feMergeNode in="largeBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Radial Energy Gradients -->
    <radialGradient id="reactor-aura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00F0FF" stop-opacity="0.35" />
      <stop offset="40%" stop-color="#0066FF" stop-opacity="0.15" />
      <stop offset="75%" stop-color="#050B14" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#050B14" stop-opacity="0" />
    </radialGradient>

    <radialGradient id="center-core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1" />
      <stop offset="25%" stop-color="#70F0FF" stop-opacity="0.95" />
      <stop offset="55%" stop-color="#00B2FF" stop-opacity="0.8" />
      <stop offset="85%" stop-color="#0055FF" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#002266" stop-opacity="0" />
    </radialGradient>

    <linearGradient id="copper-coil" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFB700" />
      <stop offset="50%" stop-color="#FF7700" />
      <stop offset="100%" stop-color="#994400" />
    </linearGradient>

    <linearGradient id="cyan-laser" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00FFCD" />
      <stop offset="50%" stop-color="#00F0FF" />
      <stop offset="100%" stop-color="#0088FF" />
    </linearGradient>
  </defs>

  <style>
    @keyframes spinClockwise {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes spinCounter {
      from { transform: rotate(0deg); }
      to { transform: rotate(-360deg); }
    }
    @keyframes corePulse {
      0%, 100% { transform: scale(1); opacity: 0.85; }
      50% { transform: scale(1.12); opacity: 1; }
    }
    @keyframes flarePulse {
      0%, 100% { opacity: 0.5; transform: rotate(0deg) scale(0.95); }
      50% { opacity: 0.95; transform: rotate(180deg) scale(1.08); }
    }
    @keyframes ringGlow {
      0%, 100% { stroke: #00F0FF; stroke-opacity: 0.6; }
      50% { stroke: #80F5FF; stroke-opacity: 1; }
    }
    @keyframes particleFloat {
      0% { transform: translateY(0px) rotate(0deg); opacity: 0.3; }
      50% { transform: translateY(-8px) rotate(180deg); opacity: 0.9; }
      100% { transform: translateY(0px) rotate(360deg); opacity: 0.3; }
    }

    .rot-cw-slow {
      transform-origin: 400px 190px;
      animation: spinClockwise 20s linear infinite;
    }
    .rot-ccw-medium {
      transform-origin: 400px 190px;
      animation: spinCounter 12s linear infinite;
    }
    .rot-cw-fast {
      transform-origin: 400px 190px;
      animation: spinClockwise 6s linear infinite;
    }
    .rot-ccw-hyper {
      transform-origin: 400px 190px;
      animation: spinCounter 3.5s linear infinite;
    }
    .core-heart {
      transform-origin: 400px 190px;
      animation: corePulse 2.4s ease-in-out infinite;
    }
    .flare-layer {
      transform-origin: 400px 190px;
      animation: flarePulse 4s ease-in-out infinite;
    }
    .pulse-ring {
      animation: ringGlow 3s ease-in-out infinite;
    }
  </style>

  <!-- Dark Space Chassis Container -->
  <rect width="800" height="380" rx="16" fill="#050811" stroke="#00F0FF" stroke-width="1.5" stroke-opacity="0.3" />

  <!-- Outer Ambient Arc Aura -->
  <circle cx="400" cy="190" r="180" fill="url(#reactor-aura)" filter="url(#hyper-glow)" />

  <!-- Outer Metallic Ring & Notches -->
  <circle cx="400" cy="190" r="145" stroke="#1A2638" stroke-width="8" fill="none" />
  <circle cx="400" cy="190" r="141" stroke="#00F0FF" stroke-width="1.5" stroke-opacity="0.4" stroke-dasharray="12 6" fill="none" />

  <!-- ================= ROTATING LAYER 1: OUTER COPPER COILS & CHASSIS (CCW) ================= -->
  <g class="rot-ccw-medium">
    <!-- 10 Copper Arc Reactor Coils -->
    <g stroke="url(#copper-coil)" stroke-width="7" fill="none" stroke-linecap="round">
      <line x1="400" y1="52" x2="400" y2="70" />
      <line x1="481" y1="78" x2="470" y2="90" />
      <line x1="531" y1="147" x2="514" y2="153" />
      <line x1="531" y1="233" x2="514" y2="227" />
      <line x1="481" y1="302" x2="470" y2="290" />
      <line x1="400" y1="328" x2="400" y2="310" />
      <line x1="319" y1="302" x2="330" y2="290" />
      <line x1="269" y1="233" x2="286" y2="227" />
      <line x1="269" y1="147" x2="286" y2="153" />
      <line x1="319" y1="78" x2="330" y2="90" />
    </g>

    <!-- Outer Segment Brackets -->
    <circle cx="400" cy="190" r="125" stroke="#00F0FF" stroke-width="2" stroke-opacity="0.8" stroke-dasharray="24 14" fill="none" filter="url(#core-glow)" />
  </g>

  <!-- ================= ROTATING LAYER 2: INTERMEDIATE ENERGY GEAR (CW) ================= -->
  <g class="rot-cw-slow">
    <circle cx="400" cy="190" r="110" stroke="url(#cyan-laser)" stroke-width="3" stroke-dasharray="40 10 15 10" fill="none" class="pulse-ring" />
    <circle cx="400" cy="190" r="96" stroke="#0088FF" stroke-width="1.5" stroke-dasharray="6 6" stroke-opacity="0.7" fill="none" />
    
    <!-- Triangular Arc Capacitor Nodes -->
    <g fill="#00F0FF" opacity="0.9" filter="url(#core-glow)">
      <polygon points="400,86 406,96 394,96" />
      <polygon points="490,136 492,148 480,144" />
      <polygon points="490,244 480,236 492,232" />
      <polygon points="400,294 394,284 406,284" />
      <polygon points="310,244 308,232 320,236" />
      <polygon points="310,136 320,144 308,148" />
    </g>
  </g>

  <!-- ================= ROTATING LAYER 3: INNER HIGH-FREQUENCY CORE (CCW HYPER) ================= -->
  <g class="rot-ccw-hyper">
    <circle cx="400" cy="190" r="78" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="18 8 4 8" fill="none" filter="url(#core-glow)" />
    <circle cx="400" cy="190" r="66" stroke="#00FFCD" stroke-width="2.5" stroke-dasharray="30 20" fill="none" />
  </g>

  <!-- ================= ROTATING LAYER 4: FAST INNER LASER RING (CW) ================= -->
  <g class="rot-cw-fast">
    <circle cx="400" cy="190" r="52" stroke="#00F0FF" stroke-width="3.5" stroke-dasharray="12 12" fill="none" filter="url(#core-glow)" />
    <!-- 3 Triangular Power Vanes (Mark 85 Core) -->
    <g stroke="#FFFFFF" stroke-width="2" fill="none" opacity="0.9">
      <path d="M 400 142 L 441 214 L 359 214 Z" />
    </g>
  </g>

  <!-- Dynamic Energy Flare Rays -->
  <g class="flare-layer">
    <line x1="400" y1="190" x2="400" y2="40" stroke="#00F0FF" stroke-width="1.5" stroke-opacity="0.4" />
    <line x1="400" y1="190" x2="530" y2="115" stroke="#00F0FF" stroke-width="1.5" stroke-opacity="0.4" />
    <line x1="400" y1="190" x2="530" y2="265" stroke="#00F0FF" stroke-width="1.5" stroke-opacity="0.4" />
    <line x1="400" y1="190" x2="400" y2="340" stroke="#00F0FF" stroke-width="1.5" stroke-opacity="0.4" />
    <line x1="400" y1="190" x2="270" y2="265" stroke="#00F0FF" stroke-width="1.5" stroke-opacity="0.4" />
    <line x1="400" y1="190" x2="270" y2="115" stroke="#00F0FF" stroke-width="1.5" stroke-opacity="0.4" />
  </g>

  <!-- ================= CENTRAL PULSING ARC REACTOR CORE HEART ================= -->
  <g class="core-heart">
    <!-- Inner Core Orbs -->
    <circle cx="400" cy="190" r="42" fill="url(#center-core)" filter="url(#core-glow)" />
    <circle cx="400" cy="190" r="26" fill="#FFFFFF" filter="url(#core-glow)" />
    <circle cx="400" cy="190" r="14" fill="#E5FFFF" />
  </g>

  <!-- Floating Spark Particles -->
  <g fill="#00FFCD" filter="url(#core-glow)">
    <circle cx="210" cy="110" r="2.5" class="rot-cw-slow" />
    <circle cx="610" cy="270" r="3" class="rot-ccw-medium" />
    <circle cx="590" cy="100" r="2" class="rot-cw-fast" />
    <circle cx="190" cy="280" r="3.5" class="rot-ccw-hyper" />
    <circle cx="400" cy="25" r="2" class="rot-cw-slow" />
    <circle cx="400" cy="355" r="2.5" class="rot-ccw-medium" />
  </g>
</svg>
