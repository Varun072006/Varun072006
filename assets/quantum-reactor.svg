<svg xmlns="http://www.w3.org/2000/svg" width="900" height="360" viewBox="0 0 900 360" fill="none">
  <defs>
    <!-- Quantum Glow Filters -->
    <filter id="core-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur1" />
      <feGaussianBlur stdDeviation="3" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="ring-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <radialGradient id="plasma-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#39FF14" stop-opacity="1" />
      <stop offset="40%" stop-color="#00FF41" stop-opacity="0.85" />
      <stop offset="80%" stop-color="#004d1a" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#05080e" stop-opacity="0" />
    </radialGradient>
    <clipPath id="panel-clip">
      <rect x="2" y="2" width="896" height="356" rx="14" />
    </clipPath>
  </defs>

  <style>
    @keyframes spinClockwise {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes spinCounter {
      0% { transform: rotate(360deg); }
      100% { transform: rotate(0deg); }
    }
    @keyframes corePulse {
      0%, 100% { transform: scale(1); opacity: 0.9; }
      50% { transform: scale(1.18); opacity: 1; filter: drop-shadow(0px 0px 15px #00FF41); }
    }
    @keyframes borderGlow {
      0%, 100% { stroke-opacity: 0.4; stroke: #00FF41; }
      50% { stroke-opacity: 0.95; stroke: #00FF66; }
    }
    @keyframes scanline {
      0% { transform: translateX(-400px); }
      100% { transform: translateX(900px); }
    }

    .box-border { animation: borderGlow 3.5s infinite ease-in-out; }
    .ring-outer { transform-origin: 450px 180px; animation: spinClockwise 20s linear infinite; }
    .ring-mid { transform-origin: 450px 180px; animation: spinCounter 14s linear infinite; }
    .ring-inner { transform-origin: 450px 180px; animation: spinClockwise 8s linear infinite; }
    .plasma-core { transform-origin: 450px 180px; animation: corePulse 2.5s ease-in-out infinite; }
    .scan-line { animation: scanline 4s linear infinite; }
    .text-title { font-family: 'JetBrains Mono', monospace; font-weight: 800; font-size: 16px; fill: #00FF41; letter-spacing: 3px; }
  </style>

  <!-- Dark Canvas Frame -->
  <rect x="2" y="2" width="896" height="356" rx="14" fill="#05080e" class="box-border" stroke="#00FF41" stroke-width="1.5" />

  <!-- Laser Scanline -->
  <g clip-path="url(#panel-clip)">
    <rect class="scan-line" x="0" y="2" width="400" height="2" fill="#00FF41" opacity="0.8"/>
    <rect class="scan-line" x="0" y="356" width="400" height="2" fill="#00FF41" opacity="0.8"/>
  </g>

  <!-- Title Badge Top Left -->
  <g filter="url(#ring-glow)">
    <text x="30" y="35" class="text-title">⚛️ 3D AI QUANTUM CORE [REACTOR v2050]</text>
  </g>
  <line x1="30" y1="45" x2="420" y2="45" stroke="#00FF41" stroke-opacity="0.5" stroke-width="1"/>

  <!-- ================= 3D ARC REACTOR GEOMETRY ================= -->
  <!-- Outer Magnetic Ring (Dashed Segments) -->
  <g class="ring-outer" filter="url(#ring-glow)">
    <circle cx="450" cy="180" r="140" stroke="#00FF41" stroke-width="3" stroke-dasharray="25 15 5 15" fill="none" opacity="0.6"/>
    <circle cx="450" cy="180" r="150" stroke="#00E5FF" stroke-width="1.5" stroke-dasharray="40 20" fill="none" opacity="0.4"/>
  </g>

  <!-- Mid Magnetic Ring (Coil Segments & Nodes) -->
  <g class="ring-mid" filter="url(#ring-glow)">
    <circle cx="450" cy="180" r="105" stroke="#00FF41" stroke-width="4" stroke-dasharray="18 10" fill="none" opacity="0.8"/>
    <circle cx="450" cy="75" r="5" fill="#00FF41"/>
    <circle cx="450" cy="285" r="5" fill="#00FF41"/>
    <circle cx="345" cy="180" r="5" fill="#00E5FF"/>
    <circle cx="555" cy="180" r="5" fill="#00E5FF"/>
  </g>

  <!-- Inner High-Velocity Ring -->
  <g class="ring-inner" filter="url(#ring-glow)">
    <circle cx="450" cy="180" r="70" stroke="#39FF14" stroke-width="3" stroke-dasharray="12 8" fill="none" opacity="0.9"/>
  </g>

  <!-- Central Plasma Fusion Glow -->
  <circle cx="450" cy="180" r="65" fill="url(#plasma-grad)" />

  <!-- Core Icosahedron Plasma Core -->
  <g class="plasma-core" filter="url(#core-glow)">
    <circle cx="450" cy="180" r="28" fill="#00FF41" opacity="0.95"/>
    <circle cx="450" cy="180" r="14" fill="#FFFFFF"/>
  </g>

  <!-- Orbital Particles -->
  <circle cx="310" cy="140" r="3" fill="#00FF41" opacity="0.8"/>
  <circle cx="590" cy="220" r="3" fill="#00E5FF" opacity="0.8"/>
  <circle cx="400" cy="300" r="2.5" fill="#39FF14" opacity="0.7"/>
  <circle cx="500" cy="60" r="2.5" fill="#00FF41" opacity="0.7"/>

  <!-- Footer Tag Right -->
  <text x="870" y="335" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="12" fill="#00FF41" opacity="0.75">&gt; STATUS: FUSION_CORE_ACTIVE  │  EFFICIENCY: 99.9%</text>
</svg>
