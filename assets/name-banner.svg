<svg xmlns="http://www.w3.org/2000/svg" width="850" height="240" viewBox="0 0 850 240" fill="none">
  <defs>
    <!-- Liquid Blob Gradient -->
    <radialGradient id="venom-grad" cx="50%" cy="50%" r="50%" fx="40%" fy="40%">
      <stop offset="0%" stop-color="#00FF41" stop-opacity="0.9" />
      <stop offset="45%" stop-color="#006611" stop-opacity="0.95" />
      <stop offset="85%" stop-color="#001a00" stop-opacity="0.98" />
      <stop offset="100%" stop-color="#000000" stop-opacity="1" />
    </radialGradient>

    <!-- Glowing Filters -->
    <filter id="glow-heavy" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="text-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @keyframes blobPulse {
      0%, 100% { transform: scale(1) rotate(0deg); opacity: 0.85; }
      50% { transform: scale(1.12) rotate(180deg); opacity: 1; }
    }
    @keyframes textPulse {
      0%, 100% { fill: #00FF41; opacity: 0.95; }
      50% { fill: #39FF14; opacity: 1; filter: drop-shadow(0 0 12px rgba(0, 255, 65, 0.9)); }
    }
    @keyframes tagGlow {
      0%, 100% { fill: #00FF41; opacity: 0.9; }
      50% { fill: #00FF66; opacity: 1; }
    }

    .blob {
      transform-origin: 425px 110px;
      animation: blobPulse 8s ease-in-out infinite alternate;
    }
    .main-name {
      animation: textPulse 3s ease-in-out infinite;
      font-family: 'Segoe UI', 'Inter', -apple-system, 'Roboto', sans-serif;
    }
    .subtitle {
      animation: tagGlow 3s ease-in-out infinite;
      font-family: 'JetBrains Mono', 'Fira Code', Consolas, monospace;
    }
  </style>

  <!-- Background -->
  <rect width="850" height="240" fill="#0D1117" />

  <!-- Animated Organic Green Venom Blob in Center -->
  <g filter="url(#glow-heavy)">
    <path class="blob" d="M 425,50 C 490,45 545,90 535,140 C 525,185 460,180 415,175 C 365,170 320,135 330,90 C 340,45 365,55 425,50 Z" fill="url(#venom-grad)" />
  </g>

  <!-- Main Name: VARUN S -->
  <g filter="url(#text-glow)">
    <text x="425" y="122" font-size="78" font-weight="900" text-anchor="middle" letter-spacing="4" class="main-name">VARUN S</text>
  </g>

  <!-- Subtitle Tagline -->
  <g filter="url(#text-glow)">
    <text x="425" y="172" font-size="14" font-weight="700" text-anchor="middle" letter-spacing="2.5" class="subtitle">
      <tspan fill="#FF9900">⚡</tspan>  AI ENGINEER  •  NEURAL ARCHITECT  •  SYSTEM BUILDER
    </text>
  </g>
</svg>
