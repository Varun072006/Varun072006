<svg xmlns="http://www.w3.org/2000/svg" width="850" height="240" viewBox="0 0 850 240" fill="none">
  <defs>
    <!-- Dark Center, Neon Green Edge Glow Radial Gradient -->
    <radialGradient id="venom-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#002b0d" stop-opacity="0.95" />
      <stop offset="55%" stop-color="#00FF41" stop-opacity="0.85" />
      <stop offset="85%" stop-color="#004d14" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#0D1117" stop-opacity="0" />
    </radialGradient>

    <!-- Heavy Outer Glow Filter -->
    <filter id="glow-heavy" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- High Contrast Drop Shadow for Text -->
    <filter id="text-contrast" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#000000" flood-opacity="1" />
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="1" />
    </filter>
  </defs>

  <style>
    @keyframes blobPulse {
      0%, 100% { transform: scale(1) rotate(0deg); opacity: 0.8; }
      50% { transform: scale(1.15) rotate(180deg); opacity: 1; }
    }
    @keyframes textPulse {
      0%, 100% { fill: #00FF41; }
      50% { fill: #39FF14; filter: drop-shadow(0 0 8px rgba(0, 255, 65, 0.7)); }
    }
    @keyframes tagGlow {
      0%, 100% { fill: #00FF41; opacity: 0.95; }
      50% { fill: #00FF66; opacity: 1; }
    }

    .blob {
      transform-origin: 425px 110px;
      animation: blobPulse 8s ease-in-out infinite alternate;
    }
    .main-name {
      animation: textPulse 3s ease-in-out infinite;
      font-family: 'Segoe UI', 'Inter', -apple-system, 'Roboto', sans-serif;
      paint-order: stroke fill;
    }
    .subtitle {
      animation: tagGlow 3s ease-in-out infinite;
      font-family: 'JetBrains Mono', 'Fira Code', Consolas, monospace;
      paint-order: stroke fill;
    }
  </style>

  <!-- Background -->
  <rect width="850" height="240" fill="#0D1117" />

  <!-- Animated Green Halo Venom Blob -->
  <g filter="url(#glow-heavy)">
    <path class="blob" d="M 425,45 C 500,40 560,85 545,140 C 530,190 460,185 415,180 C 360,175 310,140 320,85 C 330,40 355,50 425,45 Z" fill="url(#venom-grad)" />
  </g>

  <!-- Dark Background Silhouette Backdrop for Text -->
  <text x="425" y="122" font-size="78" font-weight="900" text-anchor="middle" letter-spacing="4" fill="#000000" stroke="#000000" stroke-width="12" stroke-linejoin="round" font-family="'Segoe UI', 'Inter', sans-serif" opacity="0.9">VARUN S</text>

  <!-- Main Name: VARUN S with dark stroke border for 100% crisp legibility -->
  <g filter="url(#text-contrast)">
    <text x="425" y="122" font-size="78" font-weight="900" text-anchor="middle" letter-spacing="4" stroke="#060A10" stroke-width="5" stroke-linejoin="round" class="main-name">VARUN S</text>
  </g>

  <!-- Subtitle Tagline -->
  <g filter="url(#text-contrast)">
    <text x="425" y="172" font-size="14" font-weight="700" text-anchor="middle" letter-spacing="2.5" stroke="#060A10" stroke-width="3" stroke-linejoin="round" class="subtitle">
      <tspan fill="#FF9900" stroke="none">⚡</tspan>  AI ENGINEER  •  NEURAL ARCHITECT  •  SYSTEM BUILDER
    </text>
  </g>
</svg>
